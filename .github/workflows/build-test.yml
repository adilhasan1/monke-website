name: Build_Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate page structure and asset paths
        run: npm run validate

      - name: Run project-specific smoke tests
        run: npm test

      - name: Build release package
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: monke-website-preview
          path: dist
